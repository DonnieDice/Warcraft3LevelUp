name: Package and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta*'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha*'
    branches:
      - alpha
      - dev
  workflow_dispatch:
    inputs:
      release_type:
        description: Release channel to publish/notify
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      tag_name:
        description: Tag name to use in release links and notifications
        required: false
        default: v1.0.9
        type: string

env:
  CF_API_KEY: ${{ secrets.CF_API_KEY }}
  WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
  WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
  GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠️ Clone Project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧰 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 🧑‍🔧 Configure Git User
        run: |
          git config --global user.name "donniedice"
          git config --global user.email "donniedice@protonmail.com"

      - name: 🧭 Determine Release Type
        id: release_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.release_type }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.ref }}" in
              refs/tags/*)
                if [[ "${{ github.ref }}" == *"beta"* ]]; then
                  echo "type=beta" >> $GITHUB_OUTPUT
                elif [[ "${{ github.ref }}" == *"alpha"* ]]; then
                  echo "type=alpha" >> $GITHUB_OUTPUT
                else
                  echo "type=release" >> $GITHUB_OUTPUT
                fi
                ;;
              refs/heads/dev)
                echo "type=dev" >> $GITHUB_OUTPUT
                ;;
              refs/heads/alpha)
                echo "type=alpha-branch" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "type=unknown" >> $GITHUB_OUTPUT
                ;;
            esac
          fi

      - name: 📦 Extract Version from TOC
        id: version
        run: |
          version=$(grep -oP '^## Version: \K(.*)' Warcraft3LevelUp.toc)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" >> $GITHUB_OUTPUT

      - name: Validate Release Metadata
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          curse_id="$(grep -oP '^## X-Curse-Project-ID:\s*\K(.*)' Warcraft3LevelUp.toc || true)"
          wago_id="$(grep -oP '^## X-Wago-ID:\s*\K(.*)' Warcraft3LevelUp.toc || true)"
          wowi_id="$(grep -oP '^## X-WoWI-ID:\s*\K(.*)' Warcraft3LevelUp.toc || true)"

          echo "Detected project IDs:"
          echo "  X-Curse-Project-ID: ${curse_id:-missing}"
          echo "  X-Wago-ID: ${wago_id:-missing}"
          echo "  X-WoWI-ID: ${wowi_id:-missing}"

          if [[ -z "$curse_id" ]]; then
            echo "::warning::X-Curse-Project-ID is missing. CurseForge upload will be skipped."
          fi

          if [[ -z "$wago_id" ]]; then
            echo "::warning::X-Wago-ID is missing. Wago upload will be skipped."
          fi

          if [[ -z "$wowi_id" ]]; then
            echo "::warning::X-WoWI-ID is missing. WoWInterface upload will be skipped."
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            norm_tag="${tag#v}"
            norm_ver="${version#v}"

            if [[ "$norm_tag" != "$norm_ver" ]]; then
              echo "::error::Tag '$tag' does not match Warcraft3LevelUp.toc version '$version'."
              exit 1
            fi

            if [[ -n "$curse_id" && -z "${CF_API_KEY:-}" ]]; then
              echo "::error::CF_API_KEY secret is missing but X-Curse-Project-ID is set. CurseForge upload cannot run."
              exit 1
            fi
          fi

      - name: 📝 Extract Latest Changelog
        id: changelog
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          short_version="${version#v}"

          if [[ -f "docs/changelogs/${short_version}.md" ]]; then
            changelog_content="$(cat "docs/changelogs/${short_version}.md")"
          elif [[ -f "docs/CHANGES.md" ]]; then
            changelog_content="$(awk '
              /^## / {
                if (started) { exit }
                started=1
              }
              started { print }
            ' docs/CHANGES.md)"
          else
            changelog_content="No changelog available."
          fi

          {
            echo "body<<EOF"
            echo "$changelog_content"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          bullet_lines="$(echo "$changelog_content" | grep -E '^[-*]|^\*\*' | head -20 | sed 's/^\*\*[^*]*\*\*[[:space:]]*//' )"
          if ((${#bullet_lines} > 980)); then
            bullet_lines="${bullet_lines:0:977}..."
          fi

          {
            echo "discord_summary<<EOF"
            echo "$bullet_lines"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 📦 Package and Release
        uses: BigWigsMods/packager@master

      - name: ℹ️ Upload Notes
        run: |
          echo "CurseForge, Wago, and WoWInterface uploads are handled by BigWigsMods/packager."
          echo "Project IDs come from X-Curse-Project-ID, X-Wago-ID, and X-WoWI-ID in Warcraft3LevelUp.toc."

      - name: 📢 Send Discord Notification
        if: success()
        shell: bash
        env:
          DISCORD_SUMMARY: ${{ steps.changelog.outputs.discord_summary }}
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TIMESTAMP: ${{ steps.version.outputs.timestamp }}
        run: |
          summary="${DISCORD_SUMMARY}"
          release_type="${RELEASE_TYPE}"
          version="${RELEASE_VERSION}"

          case "$release_type" in
            "release")
              title="WC3LU | Warcraft 3 Level-Up! ${version}"
              color=15105570
              footer="RGX Mods • Stable Release"
              description="A new stable release is live. Level up in style!"
              release_url="https://github.com/DonnieDice/Warcraft3LevelUp/releases/tag/v${version#v}"
              downloads="[CurseForge](https://www.curseforge.com/wow/addons/warcraft-3-level-up) • [Wago](https://addons.wago.io/addons/warcraft-3-level-up) • [WoWInterface](https://www.wowinterface.com/downloads/info26266) • [GitHub](${release_url})"
              channel="Release"
              ;;
            "beta")
              title="WC3LU | Warcraft 3 Level-Up! ${version} (Beta)"
              color=16744448
              footer="RGX Mods • Beta Build"
              description="Beta build available for testing."
              release_url="https://github.com/DonnieDice/Warcraft3LevelUp/releases/tag/v${version#v}"
              downloads="[CurseForge](https://www.curseforge.com/wow/addons/warcraft-3-level-up) • [GitHub](${release_url})"
              channel="Beta"
              ;;
            "alpha"|"alpha-branch")
              title="WC3LU | Warcraft 3 Level-Up! ${version} (Alpha)"
              color=9109504
              footer="RGX Mods • Alpha Build"
              description="Alpha build available for testing."
              release_url="https://github.com/DonnieDice/Warcraft3LevelUp/tree/alpha"
              downloads="[GitHub Alpha Branch](${release_url})"
              channel="Alpha"
              ;;
            "dev")
              title="WC3LU | Warcraft 3 Level-Up! ${version} (Dev)"
              color=3447003
              footer="RGX Mods • Dev Build"
              description="Development build from the dev branch."
              release_url="https://github.com/DonnieDice/Warcraft3LevelUp/tree/dev"
              downloads="[GitHub Dev Branch](${release_url})"
              channel="Dev"
              ;;
            *)
              title="WC3LU | Warcraft 3 Level-Up! ${version}"
              color=10000000
              footer="RGX Mods"
              description="Build completed."
              release_url="https://github.com/DonnieDice/Warcraft3LevelUp/releases"
              downloads="[GitHub](${release_url})"
              channel="Unknown"
              ;;
          esac

          jq -n \
            --arg username "WC3LU Releases" \
            --arg avatar_url "https://raw.githubusercontent.com/DonnieDice/Warcraft3LevelUp/main/media/logo.png" \
            --arg title "$title" \
            --arg url "$release_url" \
            --arg description "$description" \
            --argjson color "$color" \
            --arg footer "$footer" \
            --arg icon_url "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/media/kiwi.gif" \
            --arg timestamp "${RELEASE_TIMESTAMP}" \
            --arg summary "$summary" \
            --arg downloads "$downloads" \
            --arg channel "$channel" \
            '{
              username: $username,
              avatar_url: $avatar_url,
              embeds: [{
                title: $title,
                url: $url,
                description: $description,
                color: $color,
                fields: [
                  { name: "What'\''s New", value: $summary, inline: false },
                  { name: "Downloads", value: $downloads, inline: false },
                  { name: "Channel", value: $channel, inline: true }
                ],
                footer: { text: $footer, icon_url: $icon_url },
                timestamp: $timestamp
              }]
            }' > payload.json

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST -d @payload.json "$DISCORD_WEBHOOK"

      - name: ❌ Send Failure Notification
        if: failure()
        run: |
          jq -n \
            --arg version "${{ steps.version.outputs.version || 'Unknown' }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg timestamp "${{ steps.version.outputs.timestamp }}" \
            '{
              username: "WC3LU Build Failed",
              avatar_url: "https://raw.githubusercontent.com/DonnieDice/Warcraft3LevelUp/main/media/logo.png",
              embeds: [{
                title: "❌ WC3LU Build Failed",
                description: "The release workflow encountered an error",
                url: "https://github.com/DonnieDice/Warcraft3LevelUp/actions/runs/\($run_id)",
                color: 15158332,
                fields: [
                  { "name": "Version", "value": $version, "inline": true },
                  { "name": "Workflow", "value": "[View Logs](https://github.com/DonnieDice/Warcraft3LevelUp/actions/runs/\($run_id))", "inline": true }
                ],
                footer: {
                  "text": "RGX Mods - Build System",
                  "icon_url": "https://raw.githubusercontent.com/donniedice/SimpleQuestPlates/main/media/kiwi.gif"
                },
                timestamp: $timestamp
              }]
            }' > payload.json
          curl -H "Content-Type: application/json" -X POST -d @payload.json $DISCORD_WEBHOOK
